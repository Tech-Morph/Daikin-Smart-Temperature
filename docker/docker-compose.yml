version: '3.9'

services:
  smart-brain:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: smart-learning-house
    restart: unless-stopped
    volumes:
      - ../config/config.yaml:/app/config/config.yaml:ro
      - ../data:/app/data
    environment:
      - TZ=America/Los_Angeles
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
