# Smart Learning House — Configuration
# Cloud-only mode: uses Daikin Comfort Control API (scr.daikincloud.net)

daikin:
  username: "your@email.com"
  password: "yourpassword"
  uid: "your-x-daikin-uid-string"    # Static device fingerprint from app traffic
  # device_id is auto-discovered from /common/device_list on startup

comfort:
  target_temp_c: 21.0        # Target indoor temp in Celsius (matches Daikin API)
  tolerance_c: 0.8           # +/- band before issuing a control change
  min_temp_c: 18.0           # Absolute floor
  max_temp_c: 28.0           # Absolute ceiling

fan_speed:
  # Daikin f_rate values: A=auto, 3=low, 4=medium-low, 5=medium-high, 6=high, B=night
  within_tolerance: "A"      # Auto fan when within comfort band
  close_range_c: 1.5         # degrees from target -> low fan
  close_fan: "3"
  mid_range_c: 3.0           # degrees from target -> medium fan
  mid_fan: "5"
  far_fan: "6"               # Beyond mid_range -> high fan

learning:
  enabled: true
  time_slots:
    # Offsets are in Celsius, applied to target_temp_c
    morning:  { start: "06:00", end: "09:00", offset:  0.0 }
    day:      { start: "09:00", end: "17:00", offset:  0.5 }  # Slightly warmer during day
    evening:  { start: "17:00", end: "22:00", offset:  0.5 }
    night:    { start: "22:00", end: "06:00", offset: -1.0 }  # Cooler for sleep

control:
  poll_interval_s: 60          # Seconds between sensor reads (Daikin cloud rate-limit friendly)
  command_cooldown_s: 20       # Mirrors coordinator.py: skip poll for 20s after command
  min_mode_switch_interval_s: 300  # Prevent compressor short-cycling

logging:
  db_path: "data/sensor_log.db"
  level: "INFO"
